# ============================================
# APPLICATION CONFIGURATION
# ============================================

# Environment (dev, staging, prod)
environment=dev

# ============================================
# UI TEST CONFIGURATION
# ============================================

# Todo Application URL
ui.base.url=https://demo.playwright.dev/todomvc/

# Browser settings
browser.type=chromium
browser.headless=false
browser.slow.mo=500
browser.timeout=30000

# Screenshot settings
screenshot.on.failure=true
screenshot.full.page=true

# ============================================
# API TEST CONFIGURATION
# ============================================

# API Base URL
api.base.url=https://jsonplaceholder.typicode.com

# API Timeout (milliseconds)
api.timeout=30000

# API Retry settings
api.retry.count=3
api.retry.delay=1000

# ============================================
# TEST EXECUTION CONFIGURATION
# ============================================

# Parallel execution
parallel.enabled=false
parallel.thread.count=3

# ============================================
# REPORTING CONFIGURATION
# ============================================

# Allure results directory
allure.results.directory=target/allure-results

# Log settings
log.level=INFO
log.directory=target/logs

# ============================================
# TEST DATA CONFIGURATION
# ============================================

# Test data file path
testdata.api.file=testdata/api-testcases.json
testdata.ui.file=testdata/ui-testcases.json